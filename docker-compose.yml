services:
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - sqlite_data:/var/www/backend/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - php-fpm
    restart: unless-stopped

volumes:
  sqlite_data:
